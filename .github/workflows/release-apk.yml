name: Build Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Setup release keystore
        run: |
          mkdir -p ~/.android/keystores
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode --ignore-garbage > ~/.android/keystores/release.jks
          echo "Keystore SHA256:"
          keytool -list -v -keystore ~/.android/keystores/release.jks -storepass "${{ secrets.RELEASE_STORE_PASSWORD }}" 2>/dev/null | grep "SHA256"

      - name: Build release APK
        env:
          RELEASE_KEYSTORE_FILE: /home/runner/.android/keystores/release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --build-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 7
